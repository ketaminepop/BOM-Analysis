# .github/workflows/sbom-scan.yml
# SBOM Security Gate — Forenzy Networks Assignment
# Author: Naman Vaishnav
# Purpose: Generate SBOM and fail build on Critical vulnerabilities

name: SBOM Security Gate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  sbom-scan:
    name: Generate SBOM & Vulnerability Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Generate SBOM (CycloneDX JSON)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.json

      - name: Vulnerability Scan — Fail on Critical
        uses: anchore/scan-action@v3
        with:
          sbom: sbom.json
          fail-build: true
          severity-cutoff: critical

      - name: Upload SBOM as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: sbom.json

  crypto-scan:
    name: Cryptography Static Analysis (CBOM)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Semgrep Security Rules
        uses: returntocorp/semgrep-action@v1
        with:
          config: |
            p/secrets
            p/owasp-top-ten
            p/javascript
