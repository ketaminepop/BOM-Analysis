name: SBOM Security Gate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  sbom-scan:
    name: Generate SBOM & Vulnerability Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Scan directly on path — scan-action handles SBOM generation internally
      # This avoids the "sbom format not recognized" error from passing external files
      - name: Vulnerability Scan — Fail on Critical
        uses: anchore/scan-action@v3
        id: scan
        with:
          path: .
          fail-build: true
          severity-cutoff: critical

      # Separately generate SBOM just for artifact archiving
      - name: Generate SBOM for Artifact (CycloneDX JSON)
        if: always()
        uses: anchore/sbom-action@v0.17.0
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.json

      - name: Upload SBOM as Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: sbom.json

  crypto-scan:
    name: Cryptography Static Analysis (CBOM)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Semgrep Security Rules
        uses: returntocorp/semgrep-action@v1
        with:
          config: |
            p/secrets
            p/owasp-top-ten
            p/javascript
